<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="atitle adesc" preserveAspectRatio="xMidYMid meet" font-family="'Space Grotesk','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif">
  <title id="atitle">The architecture I ship on: a single self-contained Docker Compose stack behind one loopback-bound port</title>
  <desc id="adesc">An animated system diagram. A request travels from the client through Cloudflare to Nginx on the host, which terminates TLS and proxies to the one published port on 127.0.0.1. Inside the Docker Compose boundary an internal Nginx routes to the app, which reads and writes MongoDB and enqueues jobs on Redis for a background worker to consume. Each node lights up as the request reaches it.</desc>

  <defs>
    <clipPath id="around">
      <rect x="0" y="0" width="1200" height="500" rx="18" ry="18"/>
    </clipPath>

    <linearGradient id="aflow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>

    <radialGradient id="aglowIndigo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aglowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <marker id="aarrow" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffffff" fill-opacity="0.28"/>
    </marker>

    <style>
      .mono { font-family: 'JetBrains Mono','SFMono-Regular','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace; }

      /* Every connector shares one dash period and one duration, so every packet
         moves at an identical 144 px/s. Delays chain them into one request.
         The resting offset is 14, not 0: during a delayed connector's wait the
         static value renders, and at 0 that parks a visible dash stub on every
         node edge until its animation fires. At 14 the dash sits at [-14,0] —
         off the path. -1357 is one full 1371 period from 14, so the loop is seamless. */
      .flow {
        fill: none;
        stroke: url(#aflow);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 14 1357;
        stroke-dashoffset: 14;
        animation: travel 9.5s linear infinite;
      }
      .f1 { animation-delay: 0s; }
      .f2 { animation-delay: 1.25s; }
      .f3 { animation-delay: 2.63s; }
      .f4 { animation-delay: 4.17s; }
      .f5 { animation-delay: 5.83s; }
      .f6 { animation-delay: 5.83s; }
      .f7 { animation-delay: 8.52s; }

      .node { animation: pop 9.5s linear infinite; }
      .n1 { animation-delay: 0s; }
      .n2 { animation-delay: 0.42s; }
      .n3 { animation-delay: 1.66s; }
      .n4 { animation-delay: 3.34s; }
      .n5 { animation-delay: 5.00s; }
      .n6 { animation-delay: 6.38s; }
      .n7 { animation-delay: 7.88s; }
      .n8 { animation-delay: 9.07s; }

      .cursor { animation: ablink 1.05s steps(1) 1.2s infinite; }
      .orbA { animation: adrift 26s ease-in-out infinite; }
      .orbB { animation: adrift 31s ease-in-out infinite reverse; }

      @keyframes travel { from { stroke-dashoffset: 14; } to { stroke-dashoffset: -1357; } }
      @keyframes pop {
        0%, 100% { stroke: #ffffff; stroke-opacity: 0.10; }
        4%       { stroke: #22d3ee; stroke-opacity: 0.95; }
        9%       { stroke: #ffffff; stroke-opacity: 0.10; }
      }
      @keyframes ablink { 0%,48% { opacity: 1; } 49%,100% { opacity: 0; } }
      @keyframes adrift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-22px,16px); } }

      @media (prefers-reduced-motion: reduce) {
        .flow { display: none; }
        .node { animation: none; }
        .cursor { opacity: 1; animation: none; }
        .orbA, .orbB { animation: none; }
      }
    </style>
  </defs>

  <g clip-path="url(#around)">
    <rect x="0" y="0" width="1200" height="500" fill="#0a0a0a"/>
    <circle class="orbA" cx="880" cy="150" r="300" fill="url(#aglowIndigo)"/>
    <circle class="orbB" cx="240" cy="440" r="260" fill="url(#aglowCyan)"/>

    <!-- Title bar -->
    <g>
      <circle cx="30" cy="26" r="6" fill="#ff5f57"/>
      <circle cx="52" cy="26" r="6" fill="#febc2e"/>
      <circle cx="74" cy="26" r="6" fill="#28c840"/>
      <text class="mono" x="104" y="31" font-size="14" fill="#ffffff" fill-opacity="0.34">sajad@hiprax: ~/architecture</text>
      <line x1="0" y1="52" x2="1200" y2="52" stroke="#ffffff" stroke-opacity="0.07"/>
    </g>

    <text class="mono" x="48" y="90" font-size="15" fill="#22d3ee" fill-opacity="0.95">$ docker compose up -d --wait<tspan class="cursor" dx="4" fill="#22d3ee">&#9608;</tspan></text>

    <!-- Note card A: single ingress -->
    <g>
      <rect x="48" y="124" width="328" height="104" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="48" y="140" width="3" height="72" rx="1.5" fill="#22d3ee" fill-opacity="0.75"/>
      <text class="mono" x="68" y="154" font-size="10.5" letter-spacing="1.6" fill="#22d3ee" fill-opacity="0.85">SINGLE INGRESS</text>
      <text class="mono" x="68" y="178" font-size="11.5" fill="#ffffff" fill-opacity="0.52">TLS ends on the host. The stack</text>
      <text class="mono" x="68" y="194" font-size="11.5" fill="#ffffff" fill-opacity="0.52">publishes exactly one port, bound</text>
      <text class="mono" x="68" y="210" font-size="11.5" fill="#ffffff" fill-opacity="0.52">to 127.0.0.1. Nothing else is open.</text>
    </g>

    <!-- Note card B: reproducibility -->
    <g>
      <rect x="48" y="316" width="328" height="104" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="48" y="332" width="3" height="72" rx="1.5" fill="#818cf8" fill-opacity="0.75"/>
      <text class="mono" x="68" y="346" font-size="10.5" letter-spacing="1.6" fill="#818cf8" fill-opacity="0.9">SAME SHAPE, EVERY TIME</text>
      <text class="mono" x="68" y="370" font-size="11.5" fill="#ffffff" fill-opacity="0.52">One compose file. One root .env.</text>
      <text class="mono" x="68" y="386" font-size="11.5" fill="#ffffff" fill-opacity="0.52">Comes up the same on my laptop</text>
      <text class="mono" x="68" y="402" font-size="11.5" fill="#ffffff" fill-opacity="0.52">and on a bare VPS. Boring on purpose.</text>
    </g>

    <!-- Compose boundary. Label sits inside the box: masking the dashed border
         with an opaque rect showed as a black bar over the ambient glow. -->
    <rect x="616" y="112" width="536" height="316" rx="14" fill="#ffffff" fill-opacity="0.015" stroke="#818cf8" stroke-opacity="0.28" stroke-width="1.2" stroke-dasharray="6 5"/>
    <text class="mono" x="640" y="138" font-size="11" letter-spacing="0.6" fill="#818cf8" fill-opacity="0.85">docker compose &#183; one stack</text>

    <!-- Base connectors -->
    <g fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" marker-end="url(#aarrow)">
      <path d="M168,270 L228,270"/>
      <path d="M348,270 L408,270"/>
      <path d="M548,270 L650,270"/>
      <path d="M770,270 L790,270 L790,190 L810,190"/>
      <path d="M930,190 L1010,190"/>
      <path d="M870,222 L870,290 L1070,290 L1070,318"/>
      <path d="M1010,350 L930,350"/>
    </g>

    <!-- Travelling request -->
    <g>
      <path class="flow f1" d="M168,270 L228,270"/>
      <path class="flow f2" d="M348,270 L408,270"/>
      <path class="flow f3" d="M548,270 L650,270"/>
      <path class="flow f4" d="M770,270 L790,270 L790,190 L810,190"/>
      <path class="flow f5" d="M930,190 L1010,190"/>
      <path class="flow f6" d="M870,222 L870,290 L1070,290 L1070,318"/>
      <path class="flow f7" d="M1010,350 L930,350"/>
    </g>

    <!-- Edge labels. The ingress label punches through the compose boundary on
         purpose: it marks the one place anything crosses it. -->
    <rect x="546" y="243" width="106" height="18" fill="#0a0a0a"/>
    <text class="mono" x="599" y="257" font-size="10.5" text-anchor="middle" fill="#22d3ee" fill-opacity="0.75">127.0.0.1:8080</text>
    <text class="mono" x="970" y="182" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.32">read/write</text>
    <text class="mono" x="970" y="282" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.32">enqueue</text>
    <text class="mono" x="970" y="342" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.32">consume</text>

    <!-- Nodes -->
    <g>
      <rect class="node n1" x="48" y="238" width="120" height="64" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text class="mono" x="108" y="266" font-size="13.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.92">client</text>
      <text class="mono" x="108" y="284" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">browser</text>

      <rect class="node n2" x="228" y="238" width="120" height="64" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text class="mono" x="288" y="266" font-size="13.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.92">cloudflare</text>
      <text class="mono" x="288" y="284" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">dns &#183; waf</text>

      <rect class="node n3" x="408" y="238" width="140" height="64" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text class="mono" x="478" y="266" font-size="13.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.92">nginx</text>
      <text class="mono" x="478" y="284" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">:443 &#183; tls</text>

      <rect class="node n4" x="650" y="238" width="120" height="64" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text class="mono" x="710" y="266" font-size="13.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.92">nginx</text>
      <text class="mono" x="710" y="284" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">:8080 &#183; internal</text>

      <rect class="node n5" x="810" y="158" width="120" height="64" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text class="mono" x="870" y="186" font-size="13.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.92">app</text>
      <text class="mono" x="870" y="204" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">node &#183; api</text>

      <rect class="node n6" x="1010" y="158" width="120" height="64" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text class="mono" x="1070" y="186" font-size="13.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.92">mongo</text>
      <text class="mono" x="1070" y="204" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">volume</text>

      <rect class="node n7" x="1010" y="318" width="120" height="64" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text class="mono" x="1070" y="346" font-size="13.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.92">redis</text>
      <text class="mono" x="1070" y="364" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">queue &#183; cache</text>

      <rect class="node n8" x="810" y="318" width="120" height="64" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text class="mono" x="870" y="346" font-size="13.5" text-anchor="middle" fill="#ffffff" fill-opacity="0.92">worker</text>
      <text class="mono" x="870" y="364" font-size="10" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">jobs</text>
    </g>

    <text class="mono" x="48" y="468" font-size="11.5" fill="#ffffff" fill-opacity="0.34">This is not one project&#8217;s architecture. It is every project&#8217;s architecture.</text>

    <rect x="0.75" y="0.75" width="1198.5" height="498.5" rx="17.5" ry="17.5" fill="none" stroke="#ffffff" stroke-opacity="0.09"/>
  </g>
</svg>
