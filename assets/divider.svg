<!-- Do not re-add preserveAspectRatio="none" here: it suppresses the intrinsic
     aspect ratio, so a browser falls back to the default 300x150 replaced-element
     size and stretches this 2px rule into a fat bar. width/height pin the
     intrinsic size (150:1) so the rule scales to a hairline. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 8" width="1200" height="8" role="img" aria-label="Section divider">
  <defs>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="0.8" stop-color="#f472b6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="ruleClip">
      <rect x="0" y="3" width="1200" height="2" rx="1"/>
    </clipPath>

    <style>
      .sheen { animation: sweep 6s ease-in-out infinite; }
      @keyframes sweep {
        0%        { transform: translateX(-260px); }
        55%, 100% { transform: translateX(1200px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .sheen { display: none; }
      }
    </style>
  </defs>

  <rect x="0" y="3" width="1200" height="2" rx="1" fill="url(#rule)"/>
  <g clip-path="url(#ruleClip)">
    <rect class="sheen" x="0" y="3" width="260" height="2" fill="url(#sheen)"/>
  </g>
</svg>
