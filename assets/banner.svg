<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="btitle bdesc" preserveAspectRatio="xMidYMid meet" font-family="'Space Grotesk','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif">
  <title id="btitle">Sajad Khanmirzaei: Full-Stack Developer, DevOps Engineer, Applied AI</title>
  <desc id="bdesc">Animated terminal banner. A shell prompt reading "whoami" is answered by the name Sajad Khanmirzaei in a flowing indigo-to-cyan-to-pink gradient, followed by a role line that types itself out one character at a time behind a block cursor, an "Open to opportunities" status, and a pulsing radar motif.</desc>

  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="1200" height="400" rx="18" ry="18"/>
    </clipPath>

    <!-- Drives the typewriter: scaled from its own left edge, in steps, one per character. -->
    <clipPath id="typeClip">
      <rect class="typeMask" x="70" y="224" width="551" height="30"/>
    </clipPath>

    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop class="s0" offset="0" stop-color="#818cf8"/>
      <stop class="s1" offset="0.5" stop-color="#22d3ee"/>
      <stop class="s2" offset="1" stop-color="#f472b6"/>
    </linearGradient>

    <linearGradient id="ringStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>

    <radialGradient id="coreDot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="0.6" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </radialGradient>

    <radialGradient id="glowIndigo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>

    <style>
      .mono { font-family: 'JetBrains Mono','SFMono-Regular','Cascadia Code',Consolas,'Liberation Mono',Menlo,monospace; }

      .eyebrow  { opacity: 0; animation: fadeUp 0.7s ease-out 0.2s forwards; }
      .name-in  { opacity: 0; animation: fadeIn 0.9s ease-out 0.5s forwards; }
      .status-in{ opacity: 0; animation: fadeUp 0.7s ease-out 4.0s forwards; }
      .pulseDot { transform-box: fill-box; transform-origin: center; animation: statusPulse 2s ease-in-out infinite; }

      /* The mask and the caret share one 551px range and one steps(51) timing,
         so the caret sits exactly on the reveal edge in every font. */
      .typeMask {
        transform-box: fill-box;
        transform-origin: left center;
        animation: type 2.6s steps(51) 1.1s both;
      }
      .caret {
        animation: caret 2.6s steps(51) 1.1s both, blink 1.05s steps(1) 3.8s infinite;
      }

      /* Flowing headline: phase-shifted stop-color cycle (CSS, so it honours reduced motion) */
      .s0 { animation: hue 7s linear infinite; }
      .s1 { animation: hue 7s linear infinite -2.33s; }
      .s2 { animation: hue 7s linear infinite -4.66s; }

      /* Radar / deploy pulse (CSS, so it honours reduced motion) */
      .ring { transform-box: fill-box; transform-origin: center; opacity: 0; animation: radar 3.4s ease-out infinite; }
      .ring.r2 { animation-delay: 1.13s; }
      .ring.r3 { animation-delay: 2.26s; }

      .orb1 { animation: drift1 24s ease-in-out infinite; }
      .orb2 { animation: drift2 29s ease-in-out infinite; }
      .orb3 { animation: drift1 34s ease-in-out infinite; }

      @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes blink  { 0%,48% { opacity: 1; } 49%,100% { opacity: 0; } }
      @keyframes type   { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      @keyframes caret  { from { transform: translateX(0); } to { transform: translateX(551px); } }
      @keyframes statusPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(1.35); } }
      @keyframes hue { 0% { stop-color: #818cf8; } 25% { stop-color: #22d3ee; } 50% { stop-color: #f472b6; } 75% { stop-color: #22d3ee; } 100% { stop-color: #818cf8; } }
      @keyframes radar { 0% { transform: scale(0.16); opacity: 0.55; } 100% { transform: scale(1); opacity: 0; } }
      @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-26px,18px); } }
      @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(22px,-16px); } }

      @media (prefers-reduced-motion: reduce) {
        .eyebrow,.name-in,.status-in { opacity: 1; animation: none; }
        .typeMask { animation: none; }
        .caret { animation: none; transform: translateX(551px); }
        .pulseDot,.orb1,.orb2,.orb3,.s0,.s1,.s2,.ring { animation: none; }
      }
    </style>
  </defs>

  <!-- Base + ambient field (clipped to rounded window) -->
  <g clip-path="url(#round)">
    <rect x="0" y="0" width="1200" height="400" fill="#0a0a0a"/>
    <g opacity="0.9">
      <circle class="orb1" cx="930" cy="90"  r="260" fill="url(#glowIndigo)"/>
      <circle class="orb2" cx="1080" cy="360" r="220" fill="url(#glowCyan)"/>
      <circle class="orb3" cx="120" cy="380" r="200" fill="url(#glowPink)"/>
    </g>

    <!-- Radar / deploy pulse -->
    <g>
      <circle cx="965" cy="212" r="128" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
      <circle class="ring" cx="965" cy="212" r="120" fill="none" stroke="url(#ringStroke)" stroke-width="1.6"/>
      <circle class="ring r2" cx="965" cy="212" r="120" fill="none" stroke="url(#ringStroke)" stroke-width="1.6"/>
      <circle class="ring r3" cx="965" cy="212" r="120" fill="none" stroke="url(#ringStroke)" stroke-width="1.6"/>
      <circle cx="965" cy="212" r="9" fill="url(#coreDot)"/>
    </g>

    <!-- Title bar -->
    <g>
      <circle cx="30" cy="26" r="6" fill="#ff5f57"/>
      <circle cx="52" cy="26" r="6" fill="#febc2e"/>
      <circle cx="74" cy="26" r="6" fill="#28c840"/>
      <text class="mono" x="104" y="31" font-size="14" fill="#ffffff" fill-opacity="0.34">sajad@hiprax: ~/profile</text>
      <line x1="0" y1="52" x2="1200" y2="52" stroke="#ffffff" stroke-opacity="0.07"/>
    </g>

    <!-- Prompt eyebrow -->
    <text class="mono eyebrow" x="70" y="128" font-size="16" fill="#22d3ee" fill-opacity="0.95">$ whoami</text>

    <!-- Name with flowing brand gradient -->
    <g class="name-in">
      <text x="68" y="196" font-size="64" font-weight="800" letter-spacing="0.5" fill="url(#brand)">Sajad Khanmirzaei</text>
    </g>

    <!-- Role line, typed one character at a time. textLength pins the width so the
         caret lands on the last glyph regardless of which monospace font resolves. -->
    <g clip-path="url(#typeClip)">
      <text class="mono" x="70" y="246" font-size="18" textLength="551" lengthAdjust="spacing" fill="#ffffff" fill-opacity="0.82">Full-Stack Developer &#183; DevOps Engineer &#183; Applied AI</text>
    </g>
    <rect class="caret" x="70" y="230" width="9" height="20" fill="#22d3ee"/>

    <!-- Status pills -->
    <g class="status-in">
      <rect x="70" y="292" width="236" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle class="pulseDot" cx="92" cy="309" r="5" fill="#22c55e"/>
      <text class="mono" x="106" y="314" font-size="13.5" fill="#ffffff" fill-opacity="0.78">Open to opportunities</text>

      <rect x="318" y="292" width="254" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle cx="340" cy="309" r="5" fill="#22d3ee"/>
      <text class="mono" x="354" y="314" font-size="13.5" fill="#ffffff" fill-opacity="0.78">Founder &amp; CEO &#183; Hiprax</text>
    </g>

    <!-- Window frame border on top -->
    <rect x="0.75" y="0.75" width="1198.5" height="398.5" rx="17.5" ry="17.5" fill="none" stroke="#ffffff" stroke-opacity="0.09"/>
  </g>
</svg>
